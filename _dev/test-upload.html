<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Test Upload</title>
    <style>
        body {
            padding: 40px;
            font-family: Arial, sans-serif;
        }

        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 2px solid #ddd;
        }

        .status {
            padding: 10px;
            margin: 10px 0;
            background: #f0f0f0;
        }
    </style>
</head>

<body>
    <h1>🧪 Test de Upload de Imágenes</h1>

    <div class="test-section">
        <h2>Test 1: Input Simple</h2>
        <input type="file" id="test1" multiple accept="image/*">
        <div class="status" id="status1">Sin archivos seleccionados</div>
    </div>

    <div class="test-section">
        <h2>Test 2: Input con Wrapper (Como en la app)</h2>
        <div
            style="position: relative; height: 120px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center;">
            <input type="file" id="test2" multiple accept="image/*"
                style="position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10;">
            <div style="pointer-events: none;">
                <span>📸 Arrastra o selecciona fotos</span>
            </div>
        </div>
        <div class="status" id="status2">Sin archivos seleccionados</div>
    </div>

    <div class="test-section">
        <h2>Test 3: Verificar terrainPhotos element</h2>
        <input type="file" id="terrain-photos" multiple accept="image/*">
        <div class="status" id="status3">Sin archivos seleccionados</div>
    </div>

    <script type="module">
        // Test 1
        document.getElementById('test1').addEventListener('change', (e) => {
            document.getElementById('status1').textContent = `✅ ${e.target.files.length} archivo(s) seleccionado(s)`;
        });

        // Test 2 (mismo patrón que la app)
        document.getElementById('test2').addEventListener('change', (e) => {
            document.getElementById('status2').textContent = `✅ ${e.target.files.length} archivo(s) seleccionado(s)`;
        });

        // Test 3 (mismo ID que la app)
        const terrainPhotos = document.getElementById('terrain-photos');
        if (terrainPhotos) {
            console.log('✅ terrainPhotos encontrado:', terrainPhotos);
            terrainPhotos.addEventListener('change', (e) => {
                console.log('✅ Change event triggered!', e.target.files.length);
                document.getElementById('status3').textContent = `✅ ${e.target.files.length} archivo(s) seleccionado(s)`;
            });
        } else {
            console.error('❌ terrainPhotos NO encontrado');
            document.getElementById('status3').textContent = '❌ Elemento no encontrado';
        }
    </script>
</body>

</html>
